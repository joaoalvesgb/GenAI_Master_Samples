# ============================================
# Secrets - Chaves de API (preencher antes do deploy)
# ============================================
# IMPORTANTE: Substitua os valores abaixo pelas suas chaves
# codificadas em base64:
#   echo -n "sua-chave" | base64
#
# Em produção, use um gerenciador de segredos externo
# (Vault, AWS Secrets Manager, GCP Secret Manager, etc.)
# ============================================
apiVersion: v1
kind: Secret
metadata:
  name: genai-secrets
  namespace: genai
  labels:
    app.kubernetes.io/part-of: genai-master-samples
type: Opaque
data:
  # echo -n "sk-..." | base64
  OPENAI_API_KEY: ""
  # echo -n "AI..." | base64
  GOOGLE_API_KEY: ""
  # Opcionais
  ALPHA_VANTAGE_API_KEY: ""
  TAVILY_API_KEY: ""
  API_AUTH_KEY: ""

