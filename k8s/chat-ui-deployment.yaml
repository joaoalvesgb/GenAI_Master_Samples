# ============================================
# Chat UI - Deployment (Nginx)
# ============================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: genai-chat-ui
  namespace: genai
  labels:
    app: genai-chat-ui
    app.kubernetes.io/name: genai-chat-ui
    app.kubernetes.io/part-of: genai-master-samples
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: genai-chat-ui
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: genai-chat-ui
        app.kubernetes.io/name: genai-chat-ui
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
            - name: static-files
              mountPath: /usr/share/nginx/html
              readOnly: true
      volumes:
        - name: nginx-conf
          configMap:
            name: genai-chat-ui-nginx
        - name: static-files
          configMap:
            name: genai-chat-ui-static

