# ============================================
# Chat UI - ConfigMap com nginx.conf
# ============================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: genai-chat-ui-nginx
  namespace: genai
  labels:
    app: genai-chat-ui
    app.kubernetes.io/part-of: genai-master-samples
data:
  default.conf: |
    server {
        listen 80;
        server_name localhost;

        root /usr/share/nginx/html;
        index chat_sse_demo.html;

        location / {
            try_files $uri $uri/ /chat_sse_demo.html;
        }

        # Proxy para a API (dentro do cluster)
        location /api/ {
            proxy_pass http://genai-api.genai.svc.cluster.local:8000/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # SSE: desabilitar buffering
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400s;
        }

        # Cache para assets estáticos
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 7d;
            add_header Cache-Control "public, no-transform";
        }
    }

